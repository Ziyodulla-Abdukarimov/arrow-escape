<!DOCTYPE html>
<html>
<head><title>Generate Icon</title></head>
<body>
<canvas id="c" width="512" height="512"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Background
ctx.fillStyle = '#1e2a3a';
if (ctx.roundRect) {
  ctx.beginPath();
  ctx.roundRect(0, 0, 512, 512, 80);
  ctx.fill();
} else {
  ctx.fillRect(0, 0, 512, 512);
}

// Arrow body
ctx.strokeStyle = '#ffffff';
ctx.lineWidth = 52;
ctx.lineCap = 'round';
ctx.beginPath();
ctx.moveTo(80, 256);
ctx.lineTo(340, 256);
ctx.stroke();

// Arrow head
ctx.fillStyle = '#ffffff';
ctx.beginPath();
ctx.moveTo(280, 160);
ctx.lineTo(440, 256);
ctx.lineTo(280, 352);
ctx.closePath();
ctx.fill();

// Auto download
setTimeout(() => {
  const a = document.createElement('a');
  a.download = 'icon-512.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}, 300);
</script>
</body>
</html>
