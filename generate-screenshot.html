<!DOCTYPE html>
<html>
<head><title>Generate Screenshot</title></head>
<body>
<canvas id="c" width="720" height="1280"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 720, H = 1280;

// Background
ctx.fillStyle = '#ffffff';
ctx.fillRect(0, 0, W, H);

// Header
ctx.fillStyle = '#1e2a3a';
ctx.font = 'bold 64px system-ui';
ctx.textAlign = 'center';
ctx.fillText('Clear', W/2, 120);
ctx.fillText('the board', W/2, 195);

// Topbar info
ctx.font = 'bold 32px system-ui';
ctx.fillStyle = '#1e2a3a';
ctx.textAlign = 'left';
ctx.fillText('🚩 4   Level 3', 60, 280);
ctx.textAlign = 'right';
ctx.fillText('❤️❤️❤️', W-60, 280);

// Board background
const boardX = 60, boardY = 320, boardW = W-120, boardH = boardW;
ctx.fillStyle = '#f0f2f5';
ctx.strokeStyle = '#e4e8ee';
ctx.lineWidth = 3;
if (ctx.roundRect) {
  ctx.beginPath(); ctx.roundRect(boardX, boardY, boardW, boardH, 24); ctx.fill(); ctx.stroke();
} else {
  ctx.fillRect(boardX, boardY, boardW, boardH);
}

// Grid cells
const cols = 5, cellSize = (boardW - 28) / cols, gap = 7;
const colors = ['#ef4444','#3b82f6','#22c55e','#f59e0b','#8b5cf6'];
const arrows = [
  {cells:[[0,0],[1,0],[2,0]], dir:'right', color:'#ef4444'},
  {cells:[[0,1],[0,2]], dir:'down', color:'#3b82f6'},
  {cells:[[2,2],[3,2],[4,2]], dir:'right', color:'#22c55e'},
  {cells:[[4,0],[4,1]], dir:'down', color:'#f59e0b'},
  {cells:[[1,3],[2,3],[2,4]], dir:'down', color:'#8b5cf6'},
];

// Draw cells
for (let y = 0; y < cols; y++) {
  for (let x = 0; x < cols; x++) {
    const px = boardX + 14 + x*(cellSize+gap);
    const py = boardY + 14 + y*(cellSize+gap);
    ctx.fillStyle = '#ffffff';
    if (ctx.roundRect) {
      ctx.beginPath(); ctx.roundRect(px, py, cellSize, cellSize, 8); ctx.fill();
    } else { ctx.fillRect(px, py, cellSize, cellSize); }
  }
}

// Draw arrows
ctx.lineCap = 'round';
ctx.lineJoin = 'round';
arrows.forEach(a => {
  const pts = a.cells.map(([x,y]) => ({
    cx: boardX + 14 + x*(cellSize+gap) + cellSize/2,
    cy: boardY + 14 + y*(cellSize+gap) + cellSize/2
  }));
  ctx.strokeStyle = a.color;
  ctx.lineWidth = cellSize * 0.28;
  ctx.beginPath();
  pts.forEach((p,i) => i===0 ? ctx.moveTo(p.cx,p.cy) : ctx.lineTo(p.cx,p.cy));
  ctx.stroke();
  // arrowhead
  const last = pts[pts.length-1];
  const prev = pts[pts.length-2];
  const dx = last.cx-prev.cx, dy = last.cy-prev.cy;
  const len = Math.hypot(dx,dy);
  const nx = dx/len, ny = dy/len;
  const sz = cellSize*0.3;
  const px2 = -ny, py2 = nx;
  ctx.fillStyle = a.color;
  ctx.beginPath();
  ctx.moveTo(last.cx+nx*sz, last.cy+ny*sz);
  ctx.lineTo(last.cx-nx*sz*0.3+px2*sz, last.cy-ny*sz*0.3+py2*sz);
  ctx.lineTo(last.cx-nx*sz*0.3-px2*sz, last.cy-ny*sz*0.3-py2*sz);
  ctx.closePath(); ctx.fill();
});

// Bottom buttons
const btnY = boardY + boardH + 60;
const btns = [
  {x: W/2-200, label:'↶ Undo'},
  {x: W/2, label:'💡'},
  {x: W/2+200, label:'⟲ Restart'},
];
btns.forEach(b => {
  ctx.fillStyle = '#ffffff';
  ctx.strokeStyle = '#e4e8ee';
  ctx.lineWidth = 3;
  if (ctx.roundRect) {
    ctx.beginPath(); ctx.roundRect(b.x-80, btnY-32, 160, 64, 20); ctx.fill(); ctx.stroke();
  } else { ctx.fillRect(b.x-80, btnY-32, 160, 64); }
  ctx.fillStyle = '#1e2a3a';
  ctx.font = 'bold 28px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(b.label, b.x, btnY+10);
});

// Download
setTimeout(() => {
  const a = document.createElement('a');
  a.download = 'screenshot.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}, 300);
</script>
</body>
</html>
